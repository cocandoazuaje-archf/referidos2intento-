<!DOCTYPE html>
<html lang="es" ng-app="app">

<head>
  <meta charset="UTF-8">
  <title>AngularJS Dependiente de CDN v1.1</title>

  <!-- 🔴 DEPENDE DE ESTA URL -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .box {
      padding: 15px;
      background: #f3f3f3;
      border-radius: 10px;
    }
  </style>
</head>

<body ng-controller="MainCtrl">

  <h1>AngularJS depende del CDN v2.0</h1>

  <div class="box">
    <button ng-click="check()">
      Probar AngularJS
    </button>

    <p>{{ message }}</p>
  </div>

  <script>
    // Si AngularJS NO carga desde la URL, esto NO funciona
    angular.module('app', [])
      .controller('MainCtrl', function($scope) {

        $scope.message = "";

        $scope.check = function() {
          $scope.message = "AngularJS está funcionando desde CDN 🚀";
          alert("AngularJS ejecutado correctamente");
        };

      });
  </script>

</body>
</html>
